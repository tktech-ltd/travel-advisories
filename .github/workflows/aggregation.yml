name: Aggregate Travel Advisories

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: travel-advisory-aggregation
  cancel-in-progress: false

jobs:
  aggregate:
    name: Fetch & Consolidate Advisories
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run aggregator
        run: node scripts/scraper.js
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Validate output
        run: |
          echo "=== Validating output files ==="
          test -f data/travel-advisories.json || (echo "❌ Missing travel-advisories.json" && exit 1)
          test -f data/travel-advisories-index.json || (echo "❌ Missing index file" && exit 1)
          test -f data/travel-advisories-summary.csv || (echo "❌ Missing CSV file" && exit 1)
          node -e "const data=JSON.parse(require('fs').readFileSync('data/travel-advisories.json','utf8')); console.log('✅ JSON valid'); if(data.metadata.totalCountries<50) process.exit(1)"

      - name: Generate diff report
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');
          let diff = '';
          try { diff = execSync('git diff --unified=0 data/travel-advisories-index.json 2>/dev/null || echo ""', { encoding:'utf8' }); } catch(e) {}
          const levelChanges = [];
          let lastCountry = '';
          diff.split('\n').forEach(line => {
            if(line.includes('"country"')) { const m=line.match(/"country":\s*"([^"]+)"/); if(m) lastCountry=m[1]; }
            if(line.startsWith('+') && line.includes('"maxRiskLevel"')) { const m=line.match(/"maxRiskLevel":\s*(\d+)/); if(m && lastCountry) levelChanges.push({country:lastCountry,newLevel:parseInt(m[1])}); }
          });
          if(levelChanges.length>0){
            console.log('⚠️ Risk level changes detected:');
            levelChanges.forEach(c=>console.log(`  - ${c.country}: → Level ${c.newLevel}`));
            let summary='## 🌍 Travel Advisory Changes\n\n| Country | New Level |\n|---------|-----------|\n';
            levelChanges.forEach(c=>{const emoji=['⚪','🟢','🟡','🟠','🔴'][c.newLevel]||'⚪'; summary+=`| ${c.country} | ${emoji} Level ${c.newLevel} |\n`;});
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY||'/dev/null',summary);
          } else { console.log('No risk level changes detected'); }
          EOF

      - name: Commit & push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Travel Advisory Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "📭 No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            COUNTRIES=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/travel-advisories.json','utf8')).metadata.totalCountries)")
            git commit -m "chore(data): update travel advisories [$TIMESTAMP] - $COUNTRIES countries"
            git push
            echo "✅ Data committed and pushed"

  deploy-dashboard:
    name: Deploy Dashboard
    needs: aggregate
    runs-on: ubuntu-latest
    if: github.ref=='refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
